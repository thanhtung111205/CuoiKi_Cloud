# ====================================================
# CKI CLOUD G12 - Docker Compose
# Chỉ đóng gói Backend (REST API + WebSocket Server)
# ====================================================

services:
  # ==========================================
  # BACKEND - Node.js + Express + Socket.io
  # ==========================================
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: cki_cloud_backend
    command: sh -c "npx prisma db push && node src/index.js"
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - ./Backend/.env
    environment:
      PORT: 8080
      NODE_ENV: production
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/flashcard_db?schema=public&connection_limit=5"
      GOOGLE_APPLICATION_CREDENTIALS: /app/google-key.json
      PUBSUB_TOPIC_NAME: flashcard-generation-tasks-local
      PUBSUB_SUBSCRIPTION_NAME: flashcard-generation-tasks-sub-local
    volumes:
      - ./Backend/google-key.json:/app/google-key.json
      - ./Backend/firebase-db-key.json:/app/firebase-db-key.json
    depends_on:
      - db

  # ==========================================
  # DATABASE - PostgreSQL 15 (Local Development)
  # ==========================================
  db:
    image: postgres:15-alpine
    container_name: cki_cloud_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: flashcard_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
