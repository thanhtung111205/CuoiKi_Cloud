# ====================================================
# CKI CLOUD G12 - Docker Compose
# Chỉ đóng gói Backend (REST API + WebSocket Server)
# ====================================================

services:
  # ==========================================
  # BACKEND - Node.js + Express + Socket.io
  # ==========================================
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: cki_cloud_backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      NODE_ENV: production
